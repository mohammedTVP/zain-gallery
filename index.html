<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#050505;
    color:white;
    font-family:monospace;
    line-height:1.6;
}

header{
    position:sticky;
    top:0;
    z-index:1000;
    background:#050505;
    border-bottom:1px solid #1c1c1c;
    padding:18px;
}

nav{
    display:flex;
    justify-content:center;
    gap:40px;
}

nav a{
    color:#aaa;
    text-decoration:none;
    font-size:14px;
}

nav a:hover{
    color:white;
}

.container{
    max-width:1400px;
    margin:auto;
    padding:40px 20px;
}

.hero{
    text-align:center;
    padding:40px 0;
}

.hero img{
    width:140px;
    height:140px;
    object-fit:cover;
    border-radius:50%;
    border:2px solid #333;
}

.hero h1{
    margin-top:18px;
    font-size:42px;
    font-weight:400;
    letter-spacing:3px;
}

.section{
    margin:35px 0;
    padding:28px;
    background:#101010;
    border:1px solid #222;
    border-radius:14px;
}

.section h2{
    text-align:center;
    margin-bottom:16px;
    font-weight:400;
}

.section p{
    text-align:center;
    color:#bdbdbd;
}

.gallery{
    columns:4 220px;
    column-gap:18px;
    margin-top:20px;
}

.card{
    margin-bottom:18px;
    break-inside:avoid;
    background:#080808;
    border-radius:12px;
    overflow:hidden;
    border:1px solid #222;
}

.card img{
    width:100%;
    height:auto;
    display:block;
    transition:0.3s;
}

.card img:hover{
    opacity:.85;
    transform:scale(1.02);
}

footer{
    text-align:center;
    padding:30px;
    color:#777;
    border-top:1px solid #1c1c1c;
    margin-top:40px;
}

@media(max-width:768px){

    nav{
        gap:20px;
    }

    .hero h1{
        font-size:32px;
    }

    .gallery{
        columns:2 180px;
    }
}

</style>
</head>
