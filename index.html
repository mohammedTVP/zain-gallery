<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archive by Zain</title>

<link rel="icon" href="logo.png">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#050505;
    color:white;
    font-family:monospace;
    line-height:1.6;
}

header{
    position:sticky;
    top:0;
    z-index:1000;
    background:#050505;
    border-bottom:1px solid #1c1c1c;
    padding:18px;
}

nav{
    display:flex;
    justify-content:center;
    gap:40px;
}

nav a{
    color:#aaa;
    text-decoration:none;
    font-size:14px;
}

nav a:hover{
    color:white;
}

.container{
    max-width:1400px;
    margin:auto;
    padding:40px 20px;
}

.hero{
    text-align:center;
    padding:40px 0;
}

.hero img{
    width:140px;
    height:140px;
    object-fit:cover;
    border-radius:50%;
    border:2px solid #333;
}

.hero h1{
    margin-top:18px;
    font-size:42px;
    font-weight:400;
    letter-spacing:3px;
}

.section{
    margin:35px 0;
    padding:28px;
    background:#101010;
    border:1px solid #222;
    border-radius:14px;
}

.section h2{
    text-align:center;
    margin-bottom:16px;
    font-weight:400;
}

.section p{
    text-align:center;
    color:#bdbdbd;
}

/* VSCO STYLE GRID */

.gallery{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:14px;
    margin-top:20px;
}

.card{
    overflow:hidden;
    border-radius:12px;
}

.card img{
    width:100%;
    height:320px;
    object-fit:cover;
    display:block;
    cursor:pointer;
    transition:.3s ease;
}

.card img:hover{
    transform:scale(1.03);
    opacity:.9;
}

/* LIGHTBOX */

.lightbox{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.95);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.lightbox img{
    max-width:95%;
    max-height:95%;
}

.lightbox.active{
    display:flex;
}

footer{
    text-align:center;
    padding:30px;
    color:#777;
    border-top:1px solid #1c1c1c;
    margin-top:40px;
}

@media(max-width:768px){

    nav{
        gap:20px;
    }

    .hero h1{
        font-size:32px;
    }

    .gallery{
        grid-template-columns:repeat(2,1fr);
        gap:8px;
    }

    .card img{
        height:220px;
    }
}

</style>
</head>

<body>

<header>
    <nav>
        <a href="#about">About</a>
        <a href="#gallery">Gallery</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<div class="container">

    <section class="hero">
        <img src="profile.jpg" alt="Profile">
        <h1>Zain</h1>
    </section>

    <section id="about" class="section">
        <h2>About</h2>
        <p>
            A quiet collection of moments I liked enough to keep.
        </p>
    </section>

    <section id="gallery" class="section">
        <h2>Gallery</h2>

        <div class="gallery">

            <div class="card"><img src="photo1.jpg" onclick="openImage(this.src)"></div>
            <div class="card"><img src="photo2.jpg" onclick="openImage(this.src)"></div>
            <div class="card"><img src="photo3.jpg" onclick="openImage(this.src)"></div>
            <div class="card"><img src="photo4.jpg" onclick="openImage(this.src)"></div>
            <div class="card"><img src="photo5.jpg" onclick="openImage(this.src)"></div>
            <div class="card"><img src="photo6.jpg" onclick="openImage(this.src)"></div>
            <div class="card"><img src="photo7.jpg" onclick="openImage(this.src)"></div>
            <div class="card"><img src="photo8.jpg" onclick="openImage(this.src)"></div>
            <div class="card"><img src="photo9.jpg" onclick="openImage(this.src)"></div>
            <div class="card"><img src="photo10.jpg" onclick="openImage(this.src)"></div>
            <div class="card"><img src="photo11.jpg" onclick="openImage(this.src)"></div>
            <div class="card"><img src="photo12.jpg" onclick="openImage(this.src)"></div>
            <div class="card"><img src="photo13.jpg" onclick="openImage(this.src)"></div>
            <div class="card"><img src="photo14.jpg" onclick="openImage(this.src)"></div>
            <div class="card"><img src="photo15.jpg" onclick="openImage(this.src)"></div>
            <div class="card"><img src="photo16.jpg" onclick="openImage(this.src)"></div>
            <div class="card"><img src="photo17.jpg" onclick="openImage(this.src)"></div>
          <div class="card"><img src="photo18.jpg" onclick="openImage(this.src)"></div>

        </div>

    </section>

    <section id="contact" class="section">
        <h2>Contact</h2>
        <p>mohammedfarhanzain@gmail.com</p>
    </section>

</div>

<div class="lightbox" id="lightbox" onclick="closeImage()">
    <img id="lightbox-img">
</div>

<footer>
    © 2026 Archive by Zain. All Rights Reserved.
</footer>

<script>
function openImage(src){
    document.getElementById("lightbox").classList.add("active");
    document.getElementById("lightbox-img").src = src;
}

function closeImage(){
    document.getElementById("lightbox").classList.remove("active");
}
</script>

</body>
</html>
