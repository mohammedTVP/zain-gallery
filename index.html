<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zain Archive</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  background:#050505;
  color:#fff;
  font-family:monospace;
  line-height:1.6;
}

header{
  background:#050505;
  border-bottom:1px solid #1c1c1c;
  position:sticky;
  top:0;
  z-index:1000;
  text-align:center;
  padding:24px 15px 18px;
}

header h1{
  font-size:28px;
  letter-spacing:2px;
  font-weight:400;
}

nav{
  margin-top:12px;
}

nav a{
  color:#aaa;
  margin:0 14px;
  text-decoration:none;
  font-size:14px;
}

nav a:hover{
  color:white;
}

.container{
  max-width:1150px;
  margin:auto;
  padding:40px 20px;
}

.hero{
  text-align:center;
  padding:45px 0 25px;
}

.hero img{
  width:135px;
  height:135px;
  object-fit:cover;
  border-radius:50%;
  border:2px solid #333;
}

.hero h1{
  margin-top:18px;
  font-size:44px;
  font-weight:400;
  letter-spacing:3px;
}

.section{
  margin:35px 0;
  padding:28px;
  background:#101010;
  border:1px solid #222;
  border-radius:14px;
}

.section h2{
  margin-bottom:18px;
  font-size:24px;
  font-weight:400;
  text-align:center;
}

.section p{
  color:#bdbdbd;
  text-align:center;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:18px;
  margin-top:22px;
}

.card{
  background:#080808;
  border-radius:12px;
  overflow:hidden;
  border:1px solid #222;
}

.card img{
  width:100%;
  height:340px;
  object-fit:cover;
  display:block;
  transition:.3s;
}

.card img:hover{
  transform:scale(1.03);
  opacity:.85;
}

.card p{
  text-align:center;
  padding:14px;
  color:#ddd;
}

footer{
  text-align:center;
  padding:30px 20px;
  color:#777;
  border-top:1px solid #1c1c1c;
  margin-top:40px;
}

@media(max-width:700px){

  header h1{
    font-size:22px;
  }

  nav a{
    margin:0 8px;
    font-size:13px;
  }

  .hero h1{
    font-size:36px;
  }

  .section{
    padding:22px;
  }
}
</style>
</head>

<body>

<header>


  <nav>
    <a href="#about">About</a>
    <a href="#gallery">Gallery</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<div class="container">

  <section class="hero">
    <img src="profile.jpg" alt="Zain Profile Picture">
    <h1>Zain</h1>
  </section>

  <section id="about" class="section">
    <h2>About</h2>

    <p>
      A quiet collection of moments I liked enough to keep.
    </p>
  </section>

  <section id="gallery" class="section">
    <h2>Gallery</h2>

    <div class="gallery">

      <div class="card">
        <img src="photo1.jpg" alt="">
      </div>

      <div class="card">
        <img src="photo2.jpg" alt="">
      </div>

      <div class="card">
        <img src="photo3.jpg" alt="">
      </div>

      <div class="card">
        <img src="photo4.jpg" alt="">
      </div>

      <div class="card">
        <img src="photo5.jpg" alt="">
      </div>

      <div class="card">
        <img src="photo6.jpg" alt="">
      </div>

      <div class="card">
        <img src="photo7.jpg" alt="">
      </div>

      <div class="card">
        <img src="photo8.jpg" alt="">
      </div>

      <div class="card">
        <img src="photo9.jpg" alt="">
      </div>

      <div class="card">
        <img src="photo10.jpg" alt="">
      </div>

    </div>
  </section>

  <section id="contact" class="section">
    <h2>Contact</h2>

    <p>
      mohammedfarhanzain@gmail.com
    </p>
  </section>

</div>

<footer>
  © 2026 Zain Archive. All Rights Reserved.
</footer>

</body>
</html>
